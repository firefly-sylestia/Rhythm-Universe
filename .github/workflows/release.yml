name: Build GitHub APKs

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager --channel=3 "platforms;android-37" "build-tools;36.0.0"

      - name: Create private.properties for build
        env:
          PRIVATE_PROPERTIES: ${{ secrets.PRIVATE_PROPERTIES }}
        run: |
          set -euo pipefail
          if [ -n "$PRIVATE_PROPERTIES" ]; then
            printf '%s' "$PRIVATE_PROPERTIES" | base64 -di > ./private.properties
          else
            touch ./private.properties
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build universal GitHub debug and signed release APKs
        run: ./gradlew assembleGithubDebug assembleGithubRelease --stacktrace

      - name: Verify GitHub APK artifacts
        run: |
          set -euo pipefail
          mapfile -t debug_apks < <(find app/build/outputs/apk/github/debug -type f -name '*.apk' | sort)
          mapfile -t release_apks < <(find app/build/outputs/apk/github/release -type f -name '*.apk' | sort)
          printf 'Debug APKs:\n%s\n' "${debug_apks[*]}"
          printf 'Release APKs:\n%s\n' "${release_apks[*]}"
          if [ "${#debug_apks[@]}" -ne 1 ]; then
            echo "Expected exactly 1 universal debug APK, found ${#debug_apks[@]}" >&2
            exit 1
          fi
          if [ "${#release_apks[@]}" -ne 1 ]; then
            echo "Expected exactly 1 universal signed release APK, found ${#release_apks[@]}" >&2
            exit 1
          fi
          build_tools="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          "$build_tools/apksigner" verify --verbose "${debug_apks[0]}"
          "$build_tools/apksigner" verify --verbose "${release_apks[0]}"
          echo "Release APK is signed and installable."

      - name: Generate checksums
        run: |
          set -euo pipefail
          for dir in app/build/outputs/apk/github/debug app/build/outputs/apk/github/release; do
            cd "$GITHUB_WORKSPACE/$dir"
            for file in *.apk; do
              sha256sum "$file" > "$file.sha256"
              md5sum "$file" > "$file.md5"
            done
          done

      - name: Set prerelease flag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.value }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/github/debug/*.apk
            app/build/outputs/apk/github/debug/*.apk.sha256
            app/build/outputs/apk/github/debug/*.apk.md5
            app/build/outputs/apk/github/release/*.apk
            app/build/outputs/apk/github/release/*.apk.sha256
            app/build/outputs/apk/github/release/*.apk.md5
