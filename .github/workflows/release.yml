name: Build Release APK

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create files for signing
        env:
          SIGNING_KEYSTORE: ${{ secrets.SIGNING_KEYSTORE }}
          SIGNING_PROPERTIES: ${{ secrets.SIGNING_PROPERTIES }}
          PRIVATE_PROPERTIES: ${{ secrets.PRIVATE_PROPERTIES }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEYSTORE"
          test -n "$SIGNING_PROPERTIES"
          mkdir -p config/signing .config
          printf '%s' "$SIGNING_KEYSTORE" | base64 -di > ./config/signing/rhythm_keystore.jks
          printf '%s' "$SIGNING_PROPERTIES" | base64 -di > ./.config/keystore.properties
          if [ -n "$PRIVATE_PROPERTIES" ]; then
            printf '%s' "$PRIVATE_PROPERTIES" | base64 -di > ./private.properties
          else
            touch ./private.properties
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build signed universal release APK
        run: ./gradlew assembleGithubRelease --stacktrace

      - name: Verify signed release APK
        run: |
          set -euo pipefail
          apk="$(find app/build/outputs/apk/github/release -type f -name '*.apk' | sort | tee /tmp/release-apks.txt)"
          count="$(wc -l < /tmp/release-apks.txt | tr -d ' ')"
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly 1 signed universal release APK, found $count" >&2
            cat /tmp/release-apks.txt >&2
            exit 1
          fi
          "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner" verify --verbose --print-certs "$apk"

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd app/build/outputs/apk/github/release
          for file in *.apk; do
            sha256sum "$file" > "$file.sha256"
            md5sum "$file" > "$file.md5"
          done

      - name: Set prerelease flag
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.value }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/github/release/*.apk
            app/build/outputs/apk/github/release/*.apk.sha256
            app/build/outputs/apk/github/release/*.apk.md5
