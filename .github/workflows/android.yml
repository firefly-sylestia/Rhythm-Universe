name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Verify dependencies support compile SDK 37
        run: bash ./gradlew checkGithubDebugAarMetadata --stacktrace

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintGithubDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Verify dependencies support compile SDK 37
        run: bash ./gradlew checkGithubDebugAarMetadata --stacktrace

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create private.properties for build
        env:
          PRIVATE_PROPERTIES: ${{ secrets.PRIVATE_PROPERTIES }}
        run: |
          if [ -n "$PRIVATE_PROPERTIES" ]; then
            printf '%s' "$PRIVATE_PROPERTIES" | base64 -di > ./private.properties
          else
            touch ./private.properties
          fi

      - name: Build universal GitHub debug and signed release APKs
        run: ./gradlew assembleGithubDebug assembleGithubRelease --stacktrace

      - name: List all build outputs
        if: always()
        run: |
          echo "=== Debug APK Outputs ===" 
          find app/build/outputs/apk -type f -name '*.apk' | sort
          echo ""
          echo "=== Build Directory Structure ===" 
          ls -la app/build/outputs/apk/github/ 2>/dev/null || echo "github directory not found"

      - name: Verify PR APK artifacts
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          mapfile -t debug_apks < <(find app/build/outputs/apk/github/debug -type f -name '*.apk' | sort)
          mapfile -t release_apks < <(find app/build/outputs/apk/github/release -type f -name '*.apk' | sort)
          printf 'Debug APKs:\n%s\n' "${debug_apks[*]}"
          printf 'Release APKs:\n%s\n' "${release_apks[*]}"
          if [ "${#debug_apks[@]}" -ne 1 ]; then
            echo "Expected exactly 1 universal debug APK, found ${#debug_apks[@]}" >&2
            exit 1
          fi
          if [ "${#release_apks[@]}" -ne 1 ]; then
            echo "Expected exactly 1 universal signed release APK, found ${#release_apks[@]}" >&2
            exit 1
          fi
          build_tools="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          "$build_tools/apksigner" verify --verbose "${debug_apks[0]}"
          "$build_tools/apksigner" verify --verbose "${release_apks[0]}"
          echo "Release APK is signed and installable."

      - name: Generate build info
        if: github.event_name == 'pull_request'
        run: |
          echo "Build completed at: $(date -u)" > build_info.txt
          echo "Commit: ${{ github.sha }}" >> build_info.txt
          echo "Branch: ${{ github.head_ref }}" >> build_info.txt
          echo "Artifacts: universal GitHub debug APK + universal signed GitHub release APK" >> build_info.txt

      - name: Upload PR artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: rhythm-pr-${{ github.event.pull_request.number }}
          path: |
            app/build/outputs/apk/github/debug/*.apk
            app/build/outputs/apk/github/release/*.apk
            build_info.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Report APK build status
        if: always()
        run: |
          debug_count=$(find app/build/outputs/apk/github/debug -type f -name '*.apk' 2>/dev/null | wc -l)
          release_count=$(find app/build/outputs/apk/github/release -type f -name '*.apk' 2>/dev/null | wc -l)
          echo "Debug APKs found: $debug_count"
          echo "Release APKs found: $release_count"
          if [ "$debug_count" -gt 0 ] && [ "$release_count" -gt 0 ]; then
            echo "✓ APK build successful - both debug and release APKs generated"
            echo "Artifacts are available in the workflow run."
          else
            echo "⚠ APK count mismatch: Debug=$debug_count, Release=$release_count"
          fi
