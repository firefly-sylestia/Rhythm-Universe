name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create private.properties for build
        env:
          PRIVATE_PROPERTIES: ${{ secrets.PRIVATE_PROPERTIES }}
        run: |
          if [ -n "$PRIVATE_PROPERTIES" ]; then
            printf '%s' "$PRIVATE_PROPERTIES" | base64 -di > ./private.properties
          else
            touch ./private.properties
          fi

      - name: Build universal debug and unsigned release APKs
        run: ./gradlew assembleGithubDebug assembleGithubRelease --stacktrace

      - name: Verify PR APK artifact count
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          mapfile -t apks < <(find app/build/outputs/apk/github -type f -name '*.apk' | sort)
          printf 'Built APKs:\n%s\n' "${apks[*]}"
          if [ "${#apks[@]}" -ne 2 ]; then
            echo "Expected exactly 2 APKs (debug + unsigned release), found ${#apks[@]}" >&2
            exit 1
          fi

      - name: Generate build info
        if: github.event_name == 'pull_request'
        run: |
          echo "Build completed at: $(date -u)" > build_info.txt
          echo "Commit: ${{ github.sha }}" >> build_info.txt
          echo "Branch: ${{ github.head_ref }}" >> build_info.txt
          echo "Artifacts: universal GitHub debug APK + universal unsigned GitHub release APK" >> build_info.txt

      - name: Upload PR artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: rhythm-pr-${{ github.event.pull_request.number }}
          path: |
            app/build/outputs/apk/github/debug/*.apk
            app/build/outputs/apk/github/release/*.apk
            build_info.txt
          retention-days: 14
